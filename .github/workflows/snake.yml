name: generate animated snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Imran1870
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Setup:
# 1. Save this file as .github/workflows/snake.yml in your Imran1870/Imran1870 repo.
# 2. Settings -> Actions -> General -> Workflow permissions -> "Read and write permissions".
# 3. Actions tab -> "generate animated snake" -> Run workflow (first run creates the `output` branch).
# 4. Back in README.md, delete the "<!--" / "-->" around the Contribution Snake section.
